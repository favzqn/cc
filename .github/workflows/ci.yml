name: QA Automation CI/CD Pipeline

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'   # Nightly regression at 2am UTC
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'demo'
        type: choice
        options: [demo, staging, production]
      suite:
        description: 'Test suite'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, regression, api, visual, a11y, all]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TEST_ENV: ${{ github.event.inputs.environment || 'demo' }}
  BASE_URL: https://opensource-demo.orangehrmlive.com
  ADMIN_USER: Admin
  ADMIN_PASSWORD: admin123
  NODE_VERSION: '20'

jobs:
  # ── Code Quality ──────────────────────────────────────────────────────────
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  # ── Smoke Tests (fast gate) ────────────────────────────────────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=smoke --reporter=github,allure-playwright,json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-smoke
          path: allure-results/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: smoke-artifacts
          path: reports/artifacts/
          retention-days: 3

  # ── Cross-browser Parallel Tests ──────────────────────────────────────────
  e2e:
    name: E2E (${{ matrix.browser }} shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event.inputs.suite != 'smoke' || github.event_name == 'schedule'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: mkdir -p reports/artifacts allure-results
      - name: Run E2E tests
        run: |
          npx playwright test \
            --project=${{ matrix.browser }} \
            --shard=${{ matrix.shard }}/4 \
            --reporter=github,allure-playwright,json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_WORKER_INDEX: ${{ matrix.shard }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.browser }}-${{ matrix.shard }}
          path: allure-results/
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: artifacts-${{ matrix.browser }}-${{ matrix.shard }}
          path: reports/artifacts/
          retention-days: 7

  # ── API Tests ─────────────────────────────────────────────────────────────
  api:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=api --reporter=github,allure-playwright
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-api
          path: allure-results/
          retention-days: 7

  # ── Accessibility Tests ───────────────────────────────────────────────────
  a11y:
    name: Accessibility Audit
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --grep @a11y --project=chromium --reporter=github,allure-playwright
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-a11y
          path: allure-results/
          retention-days: 7

  # ── Visual Regression ─────────────────────────────────────────────────────
  visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run visual regression tests
        run: npx playwright test --project=visual --reporter=github,allure-playwright
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: reports/artifacts/
          retention-days: 14

  # ── Allure Report with History Trend ─────────────────────────────────────
  report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: [smoke, e2e, api, a11y]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/

      - name: Copy categories config
        run: cp allure-categories.json allure-results/categories.json

      # Restore previous Allure history so trend charts work
      - name: Restore Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true
      - name: Copy history from previous report
        run: |
          if [ -d gh-pages/allure-report/history ]; then
            cp -r gh-pages/allure-report/history allure-results/history
            echo "Allure history restored"
          else
            echo "No previous history found — first run"
          fi
        continue-on-error: true

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: npm install -g allure-commandline
      - run: allure generate allure-results --clean -o allure-report

      - uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report

  # ── Performance Tests (nightly) ───────────────────────────────────────────
  performance:
    name: Performance Tests (K6)
    runs-on: ubuntu-latest
    needs: smoke
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: grafana/setup-k6-action@v1
      - run: mkdir -p reports/performance
      - run: k6 run tests/performance/login.k6.js
        continue-on-error: true
      - run: k6 run tests/performance/employee.k6.js
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-reports
          path: reports/performance/
          retention-days: 30

  # ── AI Flaky Test Analysis ────────────────────────────────────────────────
  flaky-analysis:
    name: AI Flaky Analysis
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always() && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          merge-multiple: true
          path: allure-results/
      - run: node scripts/analyze-flaky.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flaky-analysis
          path: reports/flaky-analysis.json
          retention-days: 30

  # ── Slack Notification ────────────────────────────────────────────────────
  notify:
    name: Notify Slack
    runs-on: ubuntu-latest
    needs: [smoke, e2e, api, a11y]
    if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'schedule')
    steps:
      - name: Build status summary
        id: summary
        run: |
          SMOKE="${{ needs.smoke.result }}"
          E2E="${{ needs.e2e.result }}"
          API="${{ needs.api.result }}"
          A11Y="${{ needs.a11y.result }}"

          if [[ "$SMOKE" == "success" && "$E2E" == "success" && "$API" == "success" ]]; then
            echo "status=✅ All tests passed" >> $GITHUB_OUTPUT
            echo "color=good" >> $GITHUB_OUTPUT
          else
            echo "status=❌ Test failures detected" >> $GITHUB_OUTPUT
            echo "color=danger" >> $GITHUB_OUTPUT
          fi
          echo "details=Smoke: $SMOKE | E2E: $E2E | API: $API | A11y: $A11Y" >> $GITHUB_OUTPUT

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "attachments": [{
                "color": "${{ steps.summary.outputs.color }}",
                "title": "${{ steps.summary.outputs.status }}",
                "title_link": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Environment", "value": "${{ env.TEST_ENV }}", "short": true },
                  { "title": "Results", "value": "${{ steps.summary.outputs.details }}", "short": false },
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true }
                ],
                "footer": "OrangeHRM QA Pipeline"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
